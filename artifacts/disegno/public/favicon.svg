<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F0C060"/>
      <stop offset="50%"  stop-color="#C8822A"/>
      <stop offset="100%" stop-color="#8B5A1A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#0A0A0A" rx="16"/>

  <!-- Thin gold border -->
  <rect x="4" y="4" width="92" height="92" fill="none" stroke="url(#gold)" stroke-width="1" rx="12" opacity="0.6"/>

  <!-- Elegant italic serif D -->
  <text
    x="52"
    y="73"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="72"
    font-style="italic"
    font-weight="700"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="-2"
  >D</text>

  <!-- Gold underline accent -->
  <line x1="28" y1="82" x2="72" y2="82" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
</svg>
