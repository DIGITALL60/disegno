<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EDD48A"/>
      <stop offset="45%"  stop-color="#C8822A"/>
      <stop offset="100%" stop-color="#7A4E10"/>
    </linearGradient>
  </defs>

  <!-- Pure black bg, no radius — sharp luxury -->
  <rect width="100" height="100" fill="#080808"/>

  <!-- Ultra-thin top line accent -->
  <line x1="20" y1="10" x2="80" y2="10" stroke="#C8822A" stroke-width="0.8" opacity="0.9"/>

  <!-- The D: clean, bold, centered -->
  <text
    x="50"
    y="72"
    font-family="'Didot', 'Playfair Display', 'Bodoni MT', 'Georgia', serif"
    font-size="76"
    font-weight="400"
    fill="url(#g)"
    text-anchor="middle"
  >D</text>

  <!-- Ultra-thin bottom line accent -->
  <line x1="20" y1="90" x2="80" y2="90" stroke="#C8822A" stroke-width="0.8" opacity="0.9"/>
</svg>
